<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Redirigiendo… | Apuntes UNAM</title>
    <script>
        // GitHub Pages SPA redirect: convierte /path/to/page → /#path/to/page
        // para que index.html maneje la ruta con su sistema de hash
        (function () {
            var path = window.location.pathname;
            var search = window.location.search;
            var base = '/Apuntes'; // Nombre del repo en GitHub Pages
            var hash = path.replace(base, '') || '';
            if (hash) {
                // Redirige manteniendo el hash
                window.location.replace(
                    window.location.origin + base + '/#' + hash.replace(/^\//, '') + search
                );
            } else {
                window.location.replace(window.location.origin + base + '/');
            }
        })();
    </script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        p {
            color: #64748b;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="spinner"></div>
    <p>Redirigiendo…</p>
</body>

</html>
